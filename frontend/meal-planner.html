<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Meal Planner — Smart Recipe Finder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/app.js"></script>
</head>
<body>
<div class="planner-page">

  <!-- Header -->
  <div class="planner-header">
    <div>
      <h1>📅 Meal Planner</h1>
      <p>Plan every meal for the week — track, shop, and eat well.</p>
    </div>
    <div class="planner-week-nav">
      <button class="week-btn" onclick="prevWeek()" title="Previous week">‹</button>
      <span class="week-label" id="weekLabel">Loading…</span>
      <button class="week-btn" onclick="nextWeek()" title="Next week">›</button>
    </div>
  </div>

  <!-- Action bar -->
  <div class="planner-actions">
    <button class="btn btn-secondary btn-sm" onclick="goThisWeek()">📍 This Week</button>
    <button class="btn btn-primary  btn-sm" onclick="openShoppingList()">🛒 Shopping List</button>
    <span style="margin-left:auto;font-size:.8rem;color:var(--text-muted)">
      Click any cell to add a recipe. One recipe per meal slot.
    </span>
  </div>

  <!-- Planner body -->
  <div class="planner-body">
    <div class="planner-grid-wrap">
      <div class="planner-grid planner-grid-gap" id="plannerGrid">
        <!-- Rendered by meal-planner.js -->
      </div>
    </div>
  </div>
</div>

<!-- ── RECIPE PICKER MODAL ────────────────────────────────────────────────── -->
<div class="modal-overlay" id="pickerModal" onclick="if(event.target===this)closePicker()">
  <div class="modal">
    <div class="modal-hdr">
      <h2 class="modal-title" id="pickerTitle">Pick a Recipe</h2>
      <button class="modal-close" onclick="closePicker()">✕</button>
    </div>
    <div class="modal-body">
      <input type="text" class="form-input" id="pickerSearch" placeholder="🔍 Search recipes… (Butter chicken, Caesar, Gulab jamun…)">
      <div class="recipe-pick-grid" id="pickerGrid">
        <div style="grid-column:1/-1;text-align:center;padding:1rem;color:var(--text-muted)">Loading…</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closePicker()">Cancel</button>
    </div>
  </div>
</div>

<!-- ── SHOPPING LIST MODAL ────────────────────────────────────────────────── -->
<div class="modal-overlay" id="shoppingModal" onclick="if(event.target===this)closeShoppingList()">
  <div class="modal">
    <div class="modal-hdr">
      <h2 class="modal-title">🛒 Shopping List</h2>
      <button class="modal-close" onclick="closeShoppingList()">✕</button>
    </div>
    <div class="modal-body" id="shoppingBody" style="max-height:65vh;overflow-y:auto">
      <!-- Rendered by meal-planner.js -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeShoppingList()">Close</button>
      <button class="btn btn-secondary btn-sm" onclick="printShoppingList()">🖨 Print</button>
    </div>
  </div>
</div>

<script src="/js/meal-planner.js"></script>
<script>renderNavbar('planner');</script>
</body>
</html>
