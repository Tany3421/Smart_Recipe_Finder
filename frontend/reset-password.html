<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Reset Password — Smart Recipe Finder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/app.js"></script>
</head>
<body>
<div class="auth-bg-blob"></div>
<button class="theme-btn" id="themeBtn" onclick="Theme.toggle()" style="position:fixed;top:1.2rem;right:1.5rem;z-index:100">🌙</button>

<div class="auth-page">
  <div class="auth-card page-fade">

    <div class="auth-logo">
      <h1>🍳 Smart <span>Recipe Finder</span></h1>
      <p id="logoSub">Set a new password</p>
    </div>

    <div class="auth-error" id="authError"></div>

    <!-- No token -->
    <div id="noToken" style="display:none;text-align:center">
      <div style="font-size:2.5rem;margin-bottom:1rem">🔗</div>
      <p style="color:var(--text-muted);margin-bottom:1.4rem">This reset link is invalid or has expired.</p>
      <a href="/login.html" class="btn btn-primary" style="width:100%;justify-content:center">Go to Login →</a>
    </div>

    <!-- Success state -->
    <div id="successState" style="display:none;text-align:center">
      <div style="font-size:2.5rem;margin-bottom:1rem">✅</div>
      <h3 style="font-family:var(--font-d);color:var(--text);margin-bottom:.6rem">Password Updated!</h3>
      <p style="color:var(--text-muted);margin-bottom:1.5rem">Your password has been changed. You can now log in.</p>
      <a href="/login.html" class="btn btn-primary" style="width:100%;justify-content:center">Go to Login →</a>
    </div>

    <!-- Reset form -->
    <form class="auth-form" id="resetForm" onsubmit="handleReset(event)" style="display:none">
      <p style="font-size:.86rem;color:var(--text-muted)">Enter your new password below.</p>
      <div class="form-group">
        <label class="form-label">New Password <span>*</span></label>
        <div class="input-icon-wrap" style="position:relative">
          <span class="ii">🔒</span>
          <input type="password" class="form-input" id="newPw" placeholder="Min. 6 characters" required minlength="6">
          <button type="button" class="pw-toggle" onclick="togglePw('newPw',this)">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password <span>*</span></label>
        <div class="input-icon-wrap">
          <span class="ii">🔒</span>
          <input type="password" class="form-input" id="confirmPw" placeholder="Repeat password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="resetBtn">Set New Password →</button>
    </form>

  </div>
</div>

<script>
const token = getQueryParam('token');

if(!token){
  document.getElementById('noToken').style.display='block';
  document.getElementById('logoSub').textContent='Invalid Link';
} else {
  document.getElementById('resetForm').style.display='flex';
}

function togglePw(id,btn){ const i=document.getElementById(id); i.type=i.type==='password'?'text':'password'; btn.textContent=i.type==='text'?'🙈':'👁'; }

async function handleReset(e){
  e.preventDefault();
  const pw = document.getElementById('newPw').value;
  const cp = document.getElementById('confirmPw').value;
  const err = document.getElementById('authError');

  if(pw !== cp){ err.textContent='Passwords do not match'; err.classList.add('show'); return; }
  err.classList.remove('show');

  const btn = document.getElementById('resetBtn');
  btn.disabled=true; btn.textContent='Updating…';

  try {
    await API.post('/api/auth/reset-password', { token, password: pw });
    document.getElementById('resetForm').style.display='none';
    document.getElementById('successState').style.display='block';
    document.getElementById('logoSub').textContent='All done!';
    toast('Password updated!','success');
  } catch(ex){
    err.textContent = ex.message;
    err.classList.add('show');
    btn.disabled=false; btn.textContent='Set New Password →';
  }
}
</script>
</body>
</html>
